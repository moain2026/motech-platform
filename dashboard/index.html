<!DOCTYPE html>
<html lang="ar" dir="rtl" :class="dark ? 'dark' : ''">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al-Abbasi Soft — لوحة التحكم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        colors: {
          brand:   { 50:'#eef4ff',100:'#dbe6ff',500:'#3b5bdb',600:'#2f49c0',700:'#26399b',900:'#0f172a' },
          accent:  { 400:'#34d399',500:'#10b981',600:'#059669' },
        },
        fontFamily: { sans:['Tajawal','system-ui','Segoe UI','sans-serif'] },
        boxShadow: { soft:'0 4px 24px -8px rgba(15,23,42,.18)', card:'0 1px 3px rgba(15,23,42,.08),0 8px 24px -12px rgba(15,23,42,.12)' },
      } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:'Tajawal',system-ui,sans-serif}
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
    .dark ::-webkit-scrollbar-thumb{background:#334155}
    .fade-enter{animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors"
      x-data="app()" x-init="init()">

<!-- ============ LOGIN ============ -->
<div x-show="!token" x-cloak class="min-h-screen flex items-center justify-center p-4">
  <form @submit.prevent="login()" class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-soft w-full max-w-sm space-y-5 fade-enter">
    <div class="flex flex-col items-center gap-3">
      <div x-html="logoSVG(56)"></div>
      <div class="text-center">
        <div class="text-2xl font-extrabold text-brand-900 dark:text-white">Al-Abbasi <span class="text-accent-500">Soft</span></div>
        <div class="text-sm text-slate-400">نظام إدارة الوصول الآمن</div>
      </div>
    </div>
    <div class="space-y-3">
      <input x-model="email" type="email" placeholder="البريد الإلكتروني" required
        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 outline-none transition" />
      <input x-model="password" type="password" placeholder="كلمة المرور" required
        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 outline-none transition" />
    </div>
    <button :disabled="loading" class="w-full bg-brand-600 hover:bg-brand-700 disabled:opacity-60 text-white rounded-xl py-3 font-bold transition flex items-center justify-center gap-2">
      <svg x-show="loading" class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
      <span x-text="loading?'جارٍ الدخول...':'دخول'"></span>
    </button>
    <button type="button" @click="dark=!dark;saveDark()" class="w-full text-sm text-slate-400 hover:text-brand-500 transition" x-text="dark?'☀️ الوضع الفاتح':'🌙 الوضع الداكن'"></button>
  </form>
</div>

<!-- ============ APP SHELL ============ -->
<div x-show="token" x-cloak class="min-h-screen flex">

  <!-- Sidebar -->
  <aside class="fixed lg:static inset-y-0 right-0 z-40 w-64 bg-brand-900 text-white flex flex-col transition-transform"
         :class="sidebar?'translate-x-0':'translate-x-full lg:translate-x-0'">
    <div class="px-5 py-5 flex items-center gap-3 border-b border-white/10">
      <div x-html="logoSVG(36)"></div>
      <div>
        <div class="font-extrabold leading-tight">Al-Abbasi <span class="text-accent-400">Soft</span></div>
        <div class="text-[11px] text-white/50">Secure Access</div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1 text-sm">
      <template x-for="item in nav" :key="item.id">
        <button @click="page=item.id;sidebar=false"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition"
          :class="page===item.id?'bg-white/15 font-bold':'text-white/70 hover:bg-white/10'">
          <span x-html="item.icon"></span><span x-text="item.label"></span>
        </button>
      </template>
    </nav>
    <div class="p-3 border-t border-white/10 text-xs text-white/50 space-y-2">
      <a :href="installerURL" download class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/10 hover:bg-white/20 text-white transition">⬇ تحميل تطبيق العميل</a>
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full" :class="nbMode==='live'?'bg-accent-400':'bg-amber-400'"></span>
        <span>NetBird: <span x-text="nbMode" class="font-mono"></span></span>
      </div>
      <button @click="logout()" class="w-full text-right hover:text-white transition">↩ تسجيل الخروج</button>
    </div>
  </aside>
  <div x-show="sidebar" @click="sidebar=false" class="fixed inset-0 bg-black/40 z-30 lg:hidden"></div>

  <!-- Main -->
  <div class="flex-1 min-w-0 flex flex-col">
    <!-- Topbar -->
    <header class="sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-slate-200 dark:border-slate-800 px-4 lg:px-8 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button @click="sidebar=true" class="lg:hidden p-2 -m-2 text-slate-500"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <h1 class="text-lg font-bold" x-text="nav.find(n=>n.id===page)?.label"></h1>
      </div>
      <div class="flex items-center gap-1">
        <button @click="dark=!dark;saveDark()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-500" x-html="dark?sun:moon"></button>
        <button @click="refresh()" title="تحديث" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-500" x-html="ic.rotate"></button>
      </div>
    </header>

    <main class="flex-1 p-4 lg:p-8 space-y-6 max-w-7xl w-full mx-auto">

      <!-- ===== OVERVIEW ===== -->
      <template x-if="page==='overview'">
        <div class="space-y-6 fade-enter">
          <!-- stats -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <template x-for="s in stats" :key="s.label">
              <div class="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-card border border-slate-100 dark:border-slate-800">
                <div class="flex items-center justify-between">
                  <span class="text-2xl" x-html="s.icon"></span>
                  <span class="text-3xl font-extrabold" :class="s.color" x-text="s.value"></span>
                </div>
                <div class="text-sm text-slate-400 mt-1" x-text="s.label"></div>
              </div>
            </template>
          </div>
          <!-- mini chart + activity -->
          <div class="grid lg:grid-cols-3 gap-4">
            <div class="lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-card border border-slate-100 dark:border-slate-800">
              <div class="font-bold mb-4">توزيع الحالة</div>
              <div class="space-y-3">
                <template x-for="b in statusBars" :key="b.label">
                  <div>
                    <div class="flex justify-between text-sm mb-1"><span x-text="b.label"></span><span class="text-slate-400" x-text="b.n"></span></div>
                    <div class="h-2.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                      <div class="h-full rounded-full transition-all" :class="b.color" :style="`width:${total?b.n/total*100:0}%`"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-card border border-slate-100 dark:border-slate-800">
              <div class="font-bold mb-3">آخر النشاطات</div>
              <div class="space-y-3 max-h-72 overflow-auto text-sm">
                <template x-for="a in activity.slice(0,12)" :key="a.id">
                  <div class="flex items-start gap-2">
                    <span class="mt-1 w-1.5 h-1.5 rounded-full bg-brand-500 shrink-0"></span>
                    <div><div x-text="actionLabel(a.action)"></div><div class="text-[11px] text-slate-400" x-text="fmtTime(a.created_at)"></div></div>
                  </div>
                </template>
                <div x-show="activity.length===0" class="text-slate-400">لا نشاط بعد</div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== CLIENTS ===== -->
      <template x-if="page==='clients'">
        <div class="space-y-4 fade-enter">
          <div class="flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
            <div class="flex gap-2 flex-1">
              <input x-model="search" placeholder="🔍 بحث بالاسم أو الفرع..."
                class="flex-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-brand-500 transition" />
              <select x-model="filter" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2.5 outline-none">
                <option value="">الكل</option><option value="online">متصل</option>
                <option value="pending">بانتظار</option><option value="disabled">معطّل</option>
              </select>
            </div>
            <button @click="openAdd()" class="bg-accent-600 hover:bg-accent-500 text-white px-4 py-2.5 rounded-xl font-bold transition shadow-card whitespace-nowrap">+ إضافة عميل</button>
          </div>

          <!-- DESKTOP table -->
          <div class="hidden md:block bg-white dark:bg-slate-900 rounded-2xl shadow-card border border-slate-100 dark:border-slate-800 overflow-hidden">
            <table class="w-full text-sm text-right">
              <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-400">
                <tr><th class="px-5 py-3 font-medium">العميل</th><th class="px-5 py-3 font-medium">الفرع</th><th class="px-5 py-3 font-medium">الحالة</th><th class="px-5 py-3 font-medium">آخر ظهور</th><th class="px-5 py-3 font-medium">إجراءات</th></tr>
              </thead>
              <tbody>
                <template x-for="c in filtered" :key="c.id">
                  <tr class="border-t border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/40 transition">
                    <td class="px-5 py-4">
                      <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-brand-100 dark:bg-brand-700/40 text-brand-700 dark:text-brand-100 grid place-items-center font-bold" x-text="(c.name||'؟').slice(0,1)"></div>
                        <div><div class="font-bold" x-text="c.name"></div><div class="text-[11px] text-slate-400" x-text="c.contact_name||''"></div></div>
                      </div>
                    </td>
                    <td class="px-5 py-4 text-slate-500" x-text="c.branch||'—'"></td>
                    <td class="px-5 py-4"><span class="px-2.5 py-1 rounded-full text-xs font-medium inline-flex items-center gap-1.5" :class="badge(c.status)"><span class="w-1.5 h-1.5 rounded-full" :class="dot(c.status)"></span><span x-text="statusLabel(c.status)"></span></span></td>
                    <td class="px-5 py-4 text-slate-400 text-xs" x-text="c.last_seen?fmtTime(c.last_seen):'—'"></td>
                    <td class="px-5 py-4">
                      <div class="flex gap-1">
                        <button @click="copyConn(c)" title="نسخ الاتصال" x-html="ic.copy" class="p-2 rounded-lg hover:bg-brand-50 dark:hover:bg-slate-800 text-brand-600 transition"></button>
                        <button @click="rotate(c)" title="تدوير المفتاح" x-html="ic.rotate" class="p-2 rounded-lg hover:bg-amber-50 dark:hover:bg-slate-800 text-amber-600 transition"></button>
                        <button @click="disable(c)" title="تعطيل" x-html="ic.disable" class="p-2 rounded-lg hover:bg-orange-50 dark:hover:bg-slate-800 text-orange-600 transition"></button>
                        <button @click="del(c)" title="حذف" x-html="ic.trash" class="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-slate-800 text-red-600 transition"></button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="filtered.length===0"><td colspan="5" class="px-5 py-12 text-center text-slate-400">لا يوجد عملاء مطابقون</td></tr>
              </tbody>
            </table>
          </div>

          <!-- MOBILE cards -->
          <div class="md:hidden space-y-3">
            <template x-for="c in filtered" :key="c.id">
              <div class="bg-white dark:bg-slate-900 rounded-2xl p-4 shadow-card border border-slate-100 dark:border-slate-800">
                <div class="flex items-center justify-between mb-3">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-brand-100 dark:bg-brand-700/40 text-brand-700 dark:text-brand-100 grid place-items-center font-bold" x-text="(c.name||'؟').slice(0,1)"></div>
                    <div><div class="font-bold" x-text="c.name"></div><div class="text-xs text-slate-400" x-text="c.branch||''"></div></div>
                  </div>
                  <span class="px-2.5 py-1 rounded-full text-xs font-medium inline-flex items-center gap-1.5" :class="badge(c.status)"><span class="w-1.5 h-1.5 rounded-full" :class="dot(c.status)"></span><span x-text="statusLabel(c.status)"></span></span>
                </div>
                <div class="text-[11px] text-slate-400 mb-3" x-text="c.last_seen?('آخر ظهور: '+fmtTime(c.last_seen)):'لم يتصل بعد'"></div>
                <div class="grid grid-cols-4 gap-2">
                  <button @click="copyConn(c)" class="py-2.5 rounded-xl bg-brand-50 dark:bg-slate-800 text-brand-600 grid place-items-center" x-html="ic.copy"></button>
                  <button @click="rotate(c)" class="py-2.5 rounded-xl bg-amber-50 dark:bg-slate-800 text-amber-600 grid place-items-center" x-html="ic.rotate"></button>
                  <button @click="disable(c)" class="py-2.5 rounded-xl bg-orange-50 dark:bg-slate-800 text-orange-600 grid place-items-center" x-html="ic.disable"></button>
                  <button @click="del(c)" class="py-2.5 rounded-xl bg-red-50 dark:bg-slate-800 text-red-600 grid place-items-center" x-html="ic.trash"></button>
                </div>
              </div>
            </template>
            <div x-show="filtered.length===0" class="text-center text-slate-400 py-10">لا يوجد عملاء مطابقون</div>
          </div>
        </div>
      </template>

      <!-- ===== ACTIVITY ===== -->
      <template x-if="page==='activity'">
        <div class="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-card border border-slate-100 dark:border-slate-800 fade-enter">
          <div class="font-bold mb-4">سجل العمليات</div>
          <div class="space-y-2 text-sm">
            <template x-for="a in activity" :key="a.id">
              <div class="flex items-center gap-3 py-2 border-b border-slate-50 dark:border-slate-800/50">
                <span class="w-2 h-2 rounded-full bg-brand-500 shrink-0"></span>
                <span class="flex-1" x-text="actionLabel(a.action)"></span>
                <span class="text-xs text-slate-400" x-text="fmtTime(a.created_at)"></span>
              </div>
            </template>
            <div x-show="activity.length===0" class="text-slate-400 py-8 text-center">لا نشاط بعد</div>
          </div>
        </div>
      </template>
    </main>
  </div>
</div>

<!-- ADD MODAL -->
<div x-show="showAdd" x-cloak class="fixed inset-0 z-50 bg-black/50 flex items-end sm:items-center justify-center p-0 sm:p-4">
  <div class="bg-white dark:bg-slate-900 rounded-t-3xl sm:rounded-3xl p-6 w-full sm:max-w-md space-y-4 fade-enter">
    <div class="flex items-center justify-between"><h2 class="font-bold text-lg">إضافة عميل جديد</h2><button @click="showAdd=false" class="text-slate-400 text-xl">✕</button></div>
    <template x-if="!created">
      <div class="space-y-3">
        <input x-model="form.name" placeholder="اسم العميل *" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-500" />
        <input x-model="form.branch" placeholder="الفرع" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-500" />
        <input x-model="form.contact_name" placeholder="المسؤول" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-500" />
        <input x-model="form.contact_phone" placeholder="الهاتف" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-500" />
        <button @click="addClient()" :disabled="loading||!form.name" class="w-full bg-accent-600 hover:bg-accent-500 disabled:opacity-50 text-white py-3 rounded-xl font-bold transition">حفظ وإنشاء</button>
      </div>
    </template>
    <template x-if="created">
      <div class="space-y-3">
        <div class="bg-accent-50 dark:bg-accent-600/10 border border-accent-500/30 rounded-xl p-4 space-y-2 text-sm">
          <div class="font-bold text-accent-600">✓ تم إنشاء العميل</div>
          <div>رمز التفعيل <span class="text-xs text-slate-400">(مرة واحدة)</span>:</div>
          <div class="flex items-center gap-2"><code class="flex-1 font-mono bg-white dark:bg-slate-800 px-3 py-2 rounded-lg text-brand-700 dark:text-brand-100 text-center tracking-wider" x-text="created.setup_token"></code><button @click="copy(created.setup_token)" class="p-2 bg-brand-600 text-white rounded-lg">📋</button></div>
          <div class="text-xs text-slate-400">أرسل للعميل رابط التحميل + هذا الرمز. يفتح التطبيق → يلصق الرمز → يضغط تفعيل.</div>
          <a :href="installerURL" class="flex items-center justify-center gap-2 w-full bg-brand-600 hover:bg-brand-700 text-white py-2.5 rounded-lg font-bold transition" download>⬇ تحميل التطبيق (.exe)</a>
          <button @click="copy(installerURL)" class="w-full text-xs text-brand-500 hover:underline">نسخ رابط التحميل</button>
        </div>
        <button @click="showAdd=false;created=null" class="w-full border border-slate-200 dark:border-slate-700 py-3 rounded-xl font-bold">تم</button>
      </div>
    </template>
  </div>
</div>

<!-- CONNECTION MODAL -->
<div x-show="conn" x-cloak class="fixed inset-0 z-50 bg-black/50 flex items-end sm:items-center justify-center p-0 sm:p-4">
  <div class="bg-white dark:bg-slate-900 rounded-t-3xl sm:rounded-3xl p-6 w-full sm:max-w-lg space-y-4 fade-enter max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between"><h2 class="font-bold text-lg">معلومات الاتصال <span class="text-sm text-slate-400" x-text="conn&&conn.name"></span></h2><button @click="conn=null" class="text-slate-400 text-xl">✕</button></div>
    <template x-if="conn">
      <div class="space-y-3 text-sm">
        <div class="grid grid-cols-2 gap-2">
          <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-3"><div class="text-xs text-slate-400 mb-1">NetBird IP</div><div class="flex items-center gap-1"><code class="flex-1 font-mono text-brand-700 dark:text-brand-100" x-text="conn.ip"></code><button @click="copy(conn.ip)" class="p-1.5 bg-brand-600 text-white rounded-lg text-xs">📋</button></div></div>
          <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-3"><div class="text-xs text-slate-400 mb-1">User</div><div class="flex items-center gap-1"><code class="flex-1 font-mono text-brand-700 dark:text-brand-100" x-text="conn.user"></code><button @click="copy(conn.user)" class="p-1.5 bg-brand-600 text-white rounded-lg text-xs">📋</button></div></div>
        </div>
        <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-3"><div class="flex items-center justify-between mb-1"><span class="text-xs text-slate-400">أمر SSH جاهز</span><button @click="copy(conn.ssh)" class="text-xs text-brand-500">نسخ الأمر</button></div><code class="block font-mono text-xs text-brand-700 dark:text-brand-100 break-all" x-text="conn.ssh"></code></div>
        <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-3">
          <div class="flex items-center justify-between mb-1"><span class="text-xs text-slate-400">المفتاح الخاص (Private Key)</span><button @click="copy(conn.private_key)" class="text-xs text-brand-500">نسخ المفتاح</button></div>
          <pre class="font-mono text-[10px] leading-tight text-slate-500 dark:text-slate-400 max-h-24 overflow-y-auto whitespace-pre-wrap break-all" x-text="conn.private_key"></pre>
        </div>
        <div class="bg-accent-50 dark:bg-accent-600/10 border border-accent-500/30 rounded-xl p-3">
          <div class="flex items-center justify-between mb-1"><span class="text-xs font-bold text-accent-600">⚡ بلوك جاهز للصق في وكيل AI</span><button @click="copy(conn.ready)" class="text-xs text-accent-600 font-bold">نسخ الكل</button></div>
          <pre class="font-mono text-[10px] leading-tight text-slate-600 dark:text-slate-300 max-h-32 overflow-y-auto whitespace-pre-wrap break-all" x-text="conn.ready"></pre>
        </div>
        <button @click="copy(conn.ready);toast('تم نسخ البلوك الجاهز','success')" class="w-full bg-accent-600 hover:bg-accent-500 text-white py-3 rounded-xl font-bold transition">📋 نسخ البلوك الجاهز للاتصال</button>
        <button @click="conn=null" class="w-full border border-slate-200 dark:border-slate-700 py-2.5 rounded-xl">إغلاق</button>
      </div>
    </template>
  </div>
</div>

<!-- TOASTS -->
<div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] space-y-2 w-full max-w-xs px-4">
  <template x-for="t in toasts" :key="t.id">
    <div class="rounded-xl px-4 py-3 text-sm text-white shadow-soft fade-enter flex items-center gap-2"
         :class="{'bg-accent-600':t.type==='success','bg-red-600':t.type==='error','bg-brand-600':t.type==='info'}">
      <span x-text="t.type==='success'?'✓':t.type==='error'?'⚠':'ℹ'"></span><span x-text="t.msg"></span>
    </div>
  </template>
</div>

<script>
function app(){
  return {
    token:(new URLSearchParams(location.hash.slice(1)).get('t'))||localStorage.getItem('motech_token')||'',
    dark: localStorage.getItem('motech_dark')==='1',
    sun:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>',
    moon:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>',
    email:'',password:'',loading:false,
    page:'overview', sidebar:false,
    clients:[], activity:[], nbMode:'-',
    search:'', filter:'',
    showAdd:false, created:null, conn:null, form:{name:'',branch:'',contact_name:'',contact_phone:''},
    installerURL: location.origin + '/download/motech-connect.exe',
    toasts:[],
    ic:{
      overview:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
      clients:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
      activity:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
      total:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
      online:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 9 16l10-9"/></svg>',
      pending:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
      disabled:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/></svg>',
      copy:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
      rotate:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>',
      disable:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M10 9v6M14 9v6"/></svg>',
      trash:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
    },
    get nav(){return[
      {id:'overview',label:'نظرة عامة',icon:this.ic.overview},
      {id:'clients',label:'العملاء',icon:this.ic.clients},
      {id:'activity',label:'سجل العمليات',icon:this.ic.activity},
    ]},
    async init(){
      const h=new URLSearchParams(location.hash.slice(1)).get('t');
      if(h){localStorage.setItem('motech_token',h);history.replaceState(null,'',location.pathname);}
      if(this.token){await this.health();await this.refresh();}
    },
    hdr(){return{'Content-Type':'application/json','Authorization':'Bearer '+this.token}},
    logoSVG(s){return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M32 4 56 14V32C56 47 45 56 32 60 19 56 8 47 8 32V14L32 4Z" fill="#0f172a"/><path d="M32 4 56 14V32C56 47 45 56 32 60 19 56 8 47 8 32V14L32 4Z" stroke="#10b981" stroke-width="2"/><circle cx="32" cy="26" r="4" fill="#10b981"/><circle cx="22" cy="40" r="3" fill="#34d399"/><circle cx="42" cy="40" r="3" fill="#34d399"/><path d="M32 30 24 38M32 30 40 38" stroke="#34d399" stroke-width="2" stroke-linecap="round"/></svg>`},
    async health(){try{const r=await fetch('/health');const j=await r.json();this.nbMode=j.netbird_mode}catch(e){}},
    async login(){
      this.loading=true;
      try{
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:this.email,password:this.password})});
        if(!r.ok){this.toast('بيانات الدخول غير صحيحة','error');return;}
        const j=await r.json();this.token=j.token;localStorage.setItem('motech_token',this.token);
        await this.health();await this.refresh();this.toast('مرحباً بك 👋','success');
      }finally{this.loading=false}
    },
    logout(){this.token='';localStorage.removeItem('motech_token')},
    saveDark(){localStorage.setItem('motech_dark',this.dark?'1':'0')},
    async refresh(){await Promise.all([this.load(),this.loadActivity()])},
    async load(){const r=await fetch('/api/clients',{headers:this.hdr()});if(r.ok)this.clients=await r.json()},
    async loadActivity(){const r=await fetch('/api/activity',{headers:this.hdr()});if(r.ok)this.activity=await r.json()},
    get total(){return this.clients.length},
    get filtered(){return this.clients.filter(c=>(!this.filter||c.status===this.filter)&&((c.name||'').includes(this.search)||(c.branch||'').includes(this.search)))},
    countBy(s){return this.clients.filter(c=>c.status===s).length},
    get stats(){return[
      {label:'إجمالي العملاء',value:this.total,icon:this.ic.total,color:'text-brand-600'},
      {label:'متصل',value:this.countBy('online'),icon:this.ic.online,color:'text-accent-600'},
      {label:'بانتظار',value:this.countBy('pending'),icon:this.ic.pending,color:'text-amber-500'},
      {label:'معطّل',value:this.countBy('disabled'),icon:this.ic.disabled,color:'text-red-500'},
    ]},
    get statusBars(){return[
      {label:'متصل',n:this.countBy('online'),color:'bg-accent-500'},
      {label:'بانتظار',n:this.countBy('pending'),color:'bg-amber-400'},
      {label:'غير متصل',n:this.countBy('offline'),color:'bg-slate-400'},
      {label:'معطّل',n:this.countBy('disabled'),color:'bg-red-500'},
    ]},
    statusLabel(s){return{online:'متصل',offline:'غير متصل',pending:'بانتظار',disabled:'معطّل'}[s]||s},
    badge(s){return{online:'bg-accent-50 text-accent-700 dark:bg-accent-600/15 dark:text-accent-400',pending:'bg-amber-50 text-amber-700 dark:bg-amber-500/15 dark:text-amber-400',offline:'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400',disabled:'bg-red-50 text-red-700 dark:bg-red-500/15 dark:text-red-400'}[s]||''},
    dot(s){return{online:'bg-accent-500',pending:'bg-amber-400',offline:'bg-slate-400',disabled:'bg-red-500'}[s]||''},
    actionLabel(a){const m={'client.create':'إضافة عميل','client.disable':'تعطيل عميل','client.delete':'حذف عميل','client.rotate_key':'طلب تدوير مفتاح','client.connection_copied':'نسخ معلومات اتصال','agent.register':'تسجيل وكيل','agent.rotated_applied':'تطبيق تدوير المفتاح'};return m[a]||a},
    fmtTime(t){const d=new Date(t);return d.toLocaleString('ar-SA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})},
    openAdd(){this.created=null;this.form={name:'',branch:'',contact_name:'',contact_phone:''};this.showAdd=true},
    async addClient(){
      if(!this.form.name)return;this.loading=true;
      try{
        const r=await fetch('/api/clients',{method:'POST',headers:this.hdr(),body:JSON.stringify(this.form)});
        if(r.ok){this.created=await r.json();await this.refresh();this.toast('تم إنشاء العميل','success');}
        else this.toast('فشل الإنشاء','error');
      }finally{this.loading=false}
    },
    async copyConn(c){
      try{
        const r=await fetch('/api/clients/'+c.id+'/connection',{headers:this.hdr()});
        if(!r.ok){this.toast('تعذّر جلب معلومات الاتصال','error');return}
        const j=await r.json(); j.name=c.name; this.conn=j;
      }catch(e){this.toast('خطأ في الاتصال','error')}
    },
    async rotate(c){await fetch('/api/clients/'+c.id+'/rotate-key',{method:'POST',headers:this.hdr()});this.toast('تم طلب تدوير المفتاح','info');this.refresh()},
    async disable(c){if(!confirm('تعطيل '+c.name+'؟'))return;await fetch('/api/clients/'+c.id+'/disable',{method:'POST',headers:this.hdr()});this.toast('تم التعطيل','info');this.refresh()},
    async del(c){if(!confirm('حذف '+c.name+' نهائياً؟'))return;await fetch('/api/clients/'+c.id,{method:'DELETE',headers:this.hdr()});this.toast('تم الحذف','info');this.refresh()},
    copy(t){navigator.clipboard?.writeText(t)},
    toast(msg,type='info'){const id=Date.now()+Math.random();this.toasts.push({id,msg,type});setTimeout(()=>this.toasts=this.toasts.filter(x=>x.id!==id),3000)},
  }
}
</script>
</body>
</html>
