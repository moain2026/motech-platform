name: Windows Agent E2E

# بيئة اختبار ويندوز حقيقية (مجانية) للـ agent.
# تُشغّل يدوياً من بيئة Genspark Claw عبر:  gh workflow run win-e2e.yml -f mode=build
# الـ runner = windows-latest (admin, UAC off). تلتقط كل المخرجات كـ artifacts.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "what to test"
        type: choice
        options: [build, register, full]
        default: build
      server_url:
        description: "backend URL (for register/full)"
        default: "https://qfetmfdn.gensparkclaw.com"
      setup_token:
        description: "one-time setup token from dashboard (for register/full)"
        default: ""

jobs:
  windows-e2e:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Show environment (sanity)
        shell: pwsh
        run: |
          go version
          (Get-CimInstance Win32_OperatingSystem).Caption
          whoami
          # confirm we are admin with UAC off (documented for hosted runners)
          [bool](([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator))

      - name: Build agent (both subsystems)
        shell: pwsh
        working-directory: agent
        run: |
          $env:GOOS="windows"; $env:GOARCH="amd64"; $env:CGO_ENABLED="1"
          # GUI exe (what the end user runs) — supports headless run/register too
          go build -ldflags="-H windowsgui -s -w" -o Alabbasi_soft.exe ./cmd/gui
          # service variant (no console window) + CLI variant (for debug output)
          go build -trimpath -ldflags="-H windowsgui -s -w" -o motech-connect.exe ./cmd/agent
          go build -trimpath -ldflags="-s -w" -o motech-connect-cli.exe ./cmd/agent
          Get-Item motech-connect*.exe | Select Name,Length

      - name: Smoke test — agent runs & prints usage (CLI variant)
        shell: cmd
        working-directory: agent
        run: |
          echo === running motech-connect-cli.exe with no args (expect usage) ===
          motech-connect-cli.exe > usage.txt 2>&1
          echo EXIT=%ERRORLEVEL%
          type usage.txt

      - name: Enable Windows OpenSSH Server (real Windows-only path)
        shell: pwsh
        run: |
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 -ErrorAction SilentlyContinue
          Start-Service sshd -ErrorAction SilentlyContinue
          (Get-Service sshd).Status

      - name: Register against backend (only when mode != build)
        if: ${{ inputs.mode != 'build' && inputs.setup_token != '' }}
        shell: cmd
        working-directory: agent
        run: |
          echo === register ===
          motech-connect-cli.exe register --token ${{ inputs.setup_token }} --server ${{ inputs.server_url }} > register-out.txt 2>&1
          echo EXIT=%ERRORLEVEL%
          type register-out.txt

      - name: Run loop 75s via GUI exe headless (verify heartbeat stays alive)
        if: ${{ inputs.mode == 'full' }}
        shell: pwsh
        working-directory: agent
        run: |
          # Use the SAME exe the end user runs (GUI), in headless 'run' mode.
          $p = Start-Process -FilePath .\Alabbasi_soft.exe -ArgumentList 'run' -PassThru
          Start-Sleep -Seconds 75
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue

      - name: Diagnose NetBird (did it install + join?)
        if: always()
        shell: pwsh
        run: |
          "=== netbird.exe present? ===" | Tee-Object agent\netbird-diag.txt
          $nb = @("C:\Program Files\NetBird\netbird.exe","$env:ProgramFiles\NetBird\netbird.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          ("netbird path: " + ($nb ?? 'NOT FOUND')) | Tee-Object -Append agent\netbird-diag.txt
          Get-Service netbird -ErrorAction SilentlyContinue | Format-List Name,Status,StartType | Out-String | Tee-Object -Append agent\netbird-diag.txt
          if ($nb) { & $nb status 2>&1 | Out-String | Tee-Object -Append agent\netbird-diag.txt }
          if ($nb) { & $nb status --json 2>&1 | Out-String | Tee-Object -Append agent\netbird-diag.txt }

      - name: Collect agent logs
        if: always()
        shell: pwsh
        run: |
          $log = "C:\ProgramData\Motech\agent.log"
          if (Test-Path $log) { Copy-Item $log agent\agent.log } else { "no agent.log" | Out-File agent\agent.log }
          if (Test-Path "C:\ProgramData\Motech\agent.json") {
            # redact secrets, keep shape
            (Get-Content "C:\ProgramData\Motech\agent.json" -Raw) -replace '("(agent_token|netbird_setupkey)"\s*:\s*")[^"]+', '$1<redacted>' | Out-File agent\agent.json.redacted
          }

      - name: Upload artifacts (all output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-e2e-output
          path: |
            agent/usage.txt
            agent/register-out.txt
            agent/agent.log
            agent/netbird-diag.txt
            agent/agent.json.redacted
          if-no-files-found: ignore
